name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  safety-and-syntax:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint checks
        run: npm run lint

      - name: Run safety tests
        run: npm run test:safety

      - name: Validate JavaScript syntax
        run: |
          node --check main.js
          node --check renderer.js
          node --check preload.js
          node --check main/update-manager.js
          node --check main/workspace-services.js
          node --check main/operation-queue.js
          node --check main/renderer-file-service.js
          node --check main/project-discovery-service.js

      - name: Validate packaging configuration
        run: npx electron-builder --dir --publish never
