<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
    <title>Project Manager Pro - Loading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #252525 50%, #1a1a1a 100%);
            color: #cccccc;
            overflow: hidden;
            user-select: none;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .splash-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 40px;
        }

        /* Animated background particles */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #007acc;
            border-radius: 50%;
            opacity: 0;
            animation: float-particle 8s infinite;
        }

        @keyframes float-particle {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0);
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) scale(1);
            }
        }

        /* Logo section */
        .logo-section {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInScale 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .app-logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 10px 40px rgba(0, 122, 204, 0.4));
            animation: iconPulse 3s ease-in-out infinite;
        }

        .app-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .app-title {
            font-size: 36px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: -0.8px;
            background: linear-gradient(135deg, #ffffff 0%, #b3d9ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .app-subtitle {
            font-size: 15px;
            color: #999999;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }

        /* Static loading text */
        .loading-status {
            font-size: 13px;
            color: #007acc;
            font-weight: 500;
            letter-spacing: 0.3px;
            text-align: center;
        }

        /* Loading section */
        .loading-section {
            width: 100%;
            max-width: 550px;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(40, 40, 45, 0.8);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 16px;
            box-shadow:
                inset 0 1px 3px rgba(0, 0, 0, 0.5),
                0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .progress-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: progressGlow 2s ease-in-out infinite;
        }

        @keyframes progressGlow {
            0%, 100% {
                transform: translateX(-100%);
            }
            50% {
                transform: translateX(100%);
            }
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #0066cc 0%, #007acc 30%, #00aaff 60%, #007acc 100%);
            background-size: 300% 100%;
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
            animation: shimmerProgress 2.5s linear infinite;
            box-shadow:
                0 0 20px rgba(0, 122, 204, 0.6),
                0 0 40px rgba(0, 122, 204, 0.3);
            border-radius: 3px;
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 20px;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4));
            border-radius: 3px;
        }

        @keyframes shimmerProgress {
            0% {
                background-position: 300% 0;
            }
            100% {
                background-position: -300% 0;
            }
        }

        /* Progress percentage */
        .progress-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
        }

        .progress-percentage {
            font-size: 11px;
            color: #666666;
            font-weight: 600;
            letter-spacing: 1px;
            font-variant-numeric: tabular-nums;
            min-width: 40px;
        }

        .loading-text {
            font-size: 13px;
            color: #007acc;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* Developer credit */
        .developer-credit {
            position: absolute;
            bottom: 24px;
            left: 28px;
            font-size: 11px;
            color: #666666;
            animation: fadeIn 1.2s ease-out 0.8s both;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .developer-credit::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #007acc;
            border-radius: 50%;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% {
                opacity: 0.5;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.3);
            }
        }

        .developer-credit strong {
            color: #007acc;
            font-weight: 600;
        }

        .version {
            position: absolute;
            bottom: 24px;
            right: 28px;
            font-size: 11px;
            color: #666666;
            animation: fadeIn 1.2s ease-out 0.8s both;
            font-variant-numeric: tabular-nums;
        }

        /* Animations */
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes iconPulse {
            0%, 100% {
                transform: scale(1);
                filter: drop-shadow(0 10px 40px rgba(0, 122, 204, 0.4));
            }
            50% {
                transform: scale(1.03);
                filter: drop-shadow(0 15px 50px rgba(0, 122, 204, 0.6));
            }
        }

        /* Gradient background animation */
        .bg-gradient {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 122, 204, 0.03) 0%, transparent 70%);
            animation: rotateGradient 20s linear infinite;
            pointer-events: none;
        }

        @keyframes rotateGradient {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="particles" id="particles"></div>

    <div class="splash-container">
        <div class="logo-section">
            <div class="app-logo">
                <img src="assets/logo.png" alt="Project Manager Pro Logo">
            </div>
            <h1 class="app-title">Project Manager Pro</h1>
            <p class="app-subtitle">Professional Project Management</p>
            <p class="loading-status" id="loading-status">Initializing application...</p>
        </div>

        <div class="loading-section">
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="progress-info">
                <span class="progress-percentage" id="progress-percentage">0%</span>
            </div>
        </div>

        <div class="developer-credit">
            Developed by <strong>Robin Doak</strong>
        </div>

        <div class="version" id="splash-version">v1.0.0</div>
    </div>

    <script>
        const splashApi = window.splashAPI || {
            invoke: async () => null,
            send: () => {}
        };

        // Loading stages with relevant, realistic messages
        const loadingStages = [
            { message: 'Initializing core engine...',          weight: 1.0 },
            { message: 'Loading workspace configuration...',   weight: 0.8 },
            { message: 'Restoring previous session...',        weight: 0.6 },
            { message: 'Detecting installed toolchains...',    weight: 0.9 },
            { message: 'Scanning project directories...',      weight: 1.2 },
            { message: 'Indexing project metadata...',         weight: 0.7 },
            { message: 'Connecting to Git services...',        weight: 1.0 },
            { message: 'Loading extension registry...',        weight: 0.8 },
            { message: 'Initializing file watcher...',         weight: 0.5 },
            { message: 'Applying theme and preferences...',    weight: 0.4 },
            { message: 'Building user interface...',           weight: 0.9 },
            { message: 'Registering keyboard shortcuts...',    weight: 0.3 },
            { message: 'Verifying license status...',          weight: 0.5 },
            { message: 'Finalizing startup...',                weight: 0.4 },
            { message: 'Ready',                                weight: 0.2 },
        ];

        let currentProgress = 0;
        const progressBar = document.getElementById('progress-bar');
        const progressPercentage = document.getElementById('progress-percentage');
        const loadingStatus = document.getElementById('loading-status');
        const splashVersion = document.getElementById('splash-version');

        async function loadSplashVersion() {
            try {
                const versionInfo = await splashApi.invoke('get-app-version-info');
                if (versionInfo && typeof versionInfo.displayVersion === 'string' && splashVersion) {
                    splashVersion.textContent = versionInfo.displayVersion;
                }
            } catch (error) {
                // Non-critical: keep default splash version fallback text.
            }
        }

        // Create particle effects
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (8 + Math.random() * 4) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // Smooth progress bar animation using requestAnimationFrame
        function animateProgress(targetProgress, duration) {
            return new Promise(resolve => {
                const startProgress = currentProgress;
                const diff = targetProgress - startProgress;
                const startTime = performance.now();

                function step(now) {
                    const elapsed = now - startTime;
                    const t = Math.min(elapsed / duration, 1);

                    // Ease-out cubic for natural deceleration
                    const eased = 1 - Math.pow(1 - t, 3);

                    currentProgress = startProgress + diff * eased;
                    progressBar.style.width = currentProgress + '%';
                    progressPercentage.textContent = Math.round(currentProgress) + '%';

                    if (t < 1) {
                        requestAnimationFrame(step);
                    } else {
                        currentProgress = targetProgress;
                        resolve();
                    }
                }

                requestAnimationFrame(step);
            });
        }

        // Random delay helper
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Random integer in [min, max]
        function randBetween(min, max) {
            return min + Math.random() * (max - min);
        }

        // Main loading sequence — randomized pacing, guaranteed 100%
        async function runLoadingSequence() {
            const totalWeight = loadingStages.reduce((s, st) => s + st.weight, 0);
            let accumulated = 0;

            for (let i = 0; i < loadingStages.length; i++) {
                const stage = loadingStages[i];

                // Show message
                loadingStatus.textContent = stage.message;

                // Calculate this stage's share of the progress bar
                accumulated += stage.weight;
                const targetProgress = Math.min((accumulated / totalWeight) * 100, 100);

                // Randomized animation duration (200-500ms) scaled by weight
                const animDuration = randBetween(180, 420) * stage.weight;
                await animateProgress(targetProgress, animDuration);

                // Random pause between stages (150-450ms) — shorter for light stages
                if (i < loadingStages.length - 1) {
                    const pauseDuration = randBetween(120, 400) * (0.5 + stage.weight * 0.5);
                    await delay(pauseDuration);
                }
            }

            // Guarantee the bar visually reaches exactly 100%
            if (currentProgress < 100) {
                await animateProgress(100, 200);
            }
            progressPercentage.textContent = '100%';
            progressBar.style.width = '100%';

            // Brief hold at 100% so the user sees it, then signal main process
            await delay(400);
            splashApi.send('splash-complete');
        }

        // Initialize
        createParticles();
        loadSplashVersion();

        // Start loading sequence after brief delay for initial animations
        setTimeout(() => {
            runLoadingSequence();
        }, 400);
    </script>
</body>
</html>
