<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Update Smart Dialog Demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8f4QY1zvQv8F0fY0nLMwNLD69Npy4HIg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./update-smart-dialog.css" />
    <style>
        :root {
            color-scheme: dark;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at 10% 15%, #21314f 0, transparent 32%), #0c1118;
            font-family: Segoe UI, Tahoma, sans-serif;
            color: #e8eef8;
        }

        .demo-shell {
            width: min(760px, 92vw);
            background: rgba(14, 19, 29, 0.86);
            border: 1px solid rgba(112, 138, 176, 0.28);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 20px 42px rgba(0, 0, 0, 0.35);
        }

        .demo-shell h1 {
            margin: 0 0 8px;
            font-size: 24px;
        }

        .demo-shell p {
            margin: 0 0 16px;
            color: #a8b8cf;
        }

        .demo-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .demo-btn {
            border: 1px solid rgba(152, 176, 209, 0.28);
            background: #2b3548;
            color: #e0ebff;
            border-radius: 10px;
            font-size: 14px;
            padding: 10px 14px;
            cursor: pointer;
        }

        .demo-btn:hover {
            background: #36465f;
        }
    </style>
</head>
<body>
    <main class="demo-shell">
        <h1>Update Smart Dialog</h1>
        <p>Demo actions for checking, available, downloading, and installing states.</p>
        <div class="demo-actions">
            <button id="btn-checking" class="demo-btn" type="button">Checking</button>
            <button id="btn-available" class="demo-btn" type="button">Available</button>
            <button id="btn-download" class="demo-btn" type="button">Downloading</button>
            <button id="btn-install" class="demo-btn" type="button">Installing</button>
        </div>
    </main>

    <script src="./update-smart-dialog.js"></script>
    <script>
        function nowIso() {
            return new Date().toISOString();
        }

        document.getElementById('btn-checking').addEventListener('click', function () {
            void UpdateSmartDialog.show({
                mode: 'info',
                context: 'checking',
                title: 'Checking for Updates',
                subtitle: 'Reviewing your configured update channel.',
                detail: 'You can keep working while this check runs in the background.',
                iconHtml: '<i class="fas fa-magnifying-glass"></i>',
                version: 'v1.0.0',
                channel: 'stable',
                checkedAt: nowIso(),
                progress: null,
                progressLabel: 'Contacting update service...',
                dismissible: true,
                dismissOnBackdrop: true,
                actions: [
                    { label: 'Run in Background', value: 'background', variant: 'secondary', icon: 'fa-window-minimize' }
                ]
            });
        });

        document.getElementById('btn-available').addEventListener('click', async function () {
            var result = await UpdateSmartDialog.show({
                mode: 'info',
                context: 'available',
                title: 'Update v1.1.0 Available',
                subtitle: 'A new release is ready to download.',
                detail: 'Review release notes and start the download when ready.',
                version: 'v1.1.0',
                channel: 'stable',
                checkedAt: nowIso(),
                notes: [
                    'Improved startup performance and memory usage.',
                    'Added rollback checks for stable channel.',
                    'Fixed update progress UI edge cases.'
                ],
                actions: [
                    { label: 'Download Update', value: 'download', variant: 'primary', icon: 'fa-cloud-arrow-down' },
                    { label: 'Later', value: 'later', variant: 'secondary', icon: 'fa-clock' }
                ]
            });

            if (result === 'download') {
                document.getElementById('btn-download').click();
            }
        });

        document.getElementById('btn-download').addEventListener('click', function () {
            void UpdateSmartDialog.show({
                mode: 'progress',
                context: 'download',
                title: 'Downloading v1.1.0',
                subtitle: 'Securing and verifying the update package.',
                detail: 'You can keep working while the package downloads in the background.',
                version: 'v1.1.0',
                channel: 'stable',
                checkedAt: nowIso(),
                progress: 0,
                progressLabel: 'Preparing download...',
                dismissible: true,
                dismissOnBackdrop: true,
                actions: [
                    { label: 'Run in Background', value: 'background', variant: 'secondary', icon: 'fa-window-minimize' }
                ]
            });

            var progress = 0;
            var timer = setInterval(function () {
                if (!UpdateSmartDialog.isActive()) {
                    clearInterval(timer);
                    return;
                }

                progress += Math.floor(Math.random() * 18) + 6;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(timer);
                    UpdateSmartDialog.setProgress(100, 'Download complete (100%)');
                    setTimeout(function () {
                        UpdateSmartDialog.close('download-finished');
                    }, 550);
                    return;
                }

                UpdateSmartDialog.setProgress(progress, 'Downloaded ' + progress + '%');
            }, 500);
        });

        document.getElementById('btn-install').addEventListener('click', function () {
            void UpdateSmartDialog.show({
                mode: 'progress',
                context: 'installing',
                title: 'Installing Update',
                subtitle: 'Restarting app to finish installation.',
                detail: 'The app will close and relaunch automatically.',
                iconHtml: '<i class="fas fa-rotate"></i>',
                version: 'v1.1.0',
                channel: 'stable',
                checkedAt: nowIso(),
                progress: 100,
                progressLabel: 'Preparing restart...',
                dismissible: false,
                allowEscape: false,
                allowEmptyActions: true,
                actions: []
            });
        });
    </script>
</body>
</html>
