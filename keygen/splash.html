<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: file:;">
    <title>Keygen - Loading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: #1e1f22;
            color: #c5c8ce;
            overflow: hidden;
            user-select: none;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Subtle rotating gradient background */
        .bg-gradient {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 122, 204, 0.04) 0%, transparent 65%);
            animation: rotateGradient 18s linear infinite;
            pointer-events: none;
        }

        @keyframes rotateGradient {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Floating particles */
        .particles {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #007acc;
            border-radius: 50%;
            opacity: 0;
            animation: floatParticle 7s infinite;
        }

        @keyframes floatParticle {
            0%   { opacity: 0; transform: translateY(100%) scale(0); }
            15%  { opacity: 0.5; }
            85%  { opacity: 0.5; }
            100% { opacity: 0; transform: translateY(-400px) scale(1); }
        }

        /* Main container */
        .splash-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 32px 40px;
        }

        /* Icon section */
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInScale 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .app-icon {
            width: 96px;
            height: 96px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: iconPulse 3s ease-in-out infinite;
            filter: drop-shadow(0 8px 32px rgba(0, 122, 204, 0.3));
        }

        .app-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .app-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #b3d9ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .app-subtitle {
            font-size: 12px;
            color: #6b6e76;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* Loading section */
        .loading-section {
            width: 100%;
            max-width: 320px;
            animation: fadeInUp 0.8s ease-out 0.25s both;
        }

        /* Progress track */
        .progress-container {
            width: 100%;
            height: 3px;
            background: rgba(40, 40, 45, 0.8);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 14px;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .progress-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            animation: progressGlow 2s ease-in-out infinite;
        }

        @keyframes progressGlow {
            0%, 100% { transform: translateX(-100%); }
            50%      { transform: translateX(100%); }
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0066cc 0%, #007acc 30%, #00aaff 60%, #007acc 100%);
            background-size: 300% 100%;
            border-radius: 3px;
            transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            animation: shimmerProgress 2.5s linear infinite;
            box-shadow: 0 0 14px rgba(0, 122, 204, 0.5), 0 0 28px rgba(0, 122, 204, 0.2);
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 16px;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.35));
            border-radius: 3px;
        }

        @keyframes shimmerProgress {
            0%   { background-position: 300% 0; }
            100% { background-position: -300% 0; }
        }

        /* Status text + percentage */
        .progress-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .loading-status {
            font-size: 11px;
            font-weight: 500;
            color: #007acc;
            letter-spacing: 0.2px;
        }

        .progress-percentage {
            font-size: 10px;
            font-weight: 600;
            color: #52555c;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.5px;
        }

        /* Footer credit */
        .footer-credit {
            position: absolute;
            bottom: 16px;
            font-size: 10px;
            color: #52555c;
            display: flex;
            align-items: center;
            gap: 6px;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        .footer-credit::before {
            content: '';
            width: 5px;
            height: 5px;
            background: #007acc;
            border-radius: 50%;
            animation: pulseDot 2s ease-in-out infinite;
        }

        .footer-credit strong {
            color: #007acc;
            font-weight: 600;
        }

        @keyframes pulseDot {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50%      { opacity: 1; transform: scale(1.3); }
        }

        /* Animations */
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.88) translateY(-14px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @keyframes iconPulse {
            0%, 100% {
                transform: scale(1);
                filter: drop-shadow(0 8px 32px rgba(0, 122, 204, 0.3));
            }
            50% {
                transform: scale(1.04);
                filter: drop-shadow(0 12px 40px rgba(0, 122, 204, 0.5));
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="particles" id="particles"></div>

    <div class="splash-container">
        <div class="logo-section">
            <div class="app-icon">
                <img id="splash-logo" src="../assets/keygen.png" alt="Keygen Logo">
            </div>
            <h1 class="app-title">License Key Generator</h1>
            <p class="app-subtitle">Project Manager Pro</p>
        </div>

        <div class="loading-section">
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="progress-info">
                <span class="loading-status" id="loading-status">Initializing...</span>
                <span class="progress-percentage" id="progress-percentage">0%</span>
            </div>
        </div>

        <div class="footer-credit">
            Developed by <strong>Robin Doak</strong>
        </div>
    </div>

    <script>
        const loadingMessages = [
            'Initializing application...',
            'Loading cryptographic module...',
            'Importing HMAC-SHA256 engine...',
            'Preparing key generation pipeline...',
            'Validating license secrets...',
            'Configuring tier definitions...',
            'Initializing entropy pool...',
            'Building user interface...',
            'Loading component assets...',
            'Finalizing startup...',
            'Ready'
        ];

        let currentProgress = 0;
        const progressBar = document.getElementById('progress-bar');
        const progressPct = document.getElementById('progress-percentage');
        const statusText  = document.getElementById('loading-status');
        const logoImage = document.getElementById('splash-logo');

        const logoParam = new URLSearchParams(window.location.search).get('logo');
        if (logoParam && logoImage) {
            logoImage.src = logoParam;
        }

        // Create particle effects
        (function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = (Math.random() * 7) + 's';
                p.style.animationDuration = (6 + Math.random() * 4) + 's';
                container.appendChild(p);
            }
        })();

        // Smooth progress animation
        function animateTo(target, cb) {
            const start = currentProgress;
            const diff = target - start;
            const duration = 220;
            const t0 = performance.now();

            function tick(now) {
                const elapsed = now - t0;
                const p = Math.min(elapsed / duration, 1);
                const ease = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;

                currentProgress = start + diff * ease;
                progressBar.style.width = currentProgress + '%';
                progressPct.textContent = Math.round(currentProgress) + '%';

                if (p < 1) {
                    requestAnimationFrame(tick);
                } else if (cb) {
                    cb();
                }
            }
            requestAnimationFrame(tick);
        }

        // Shuffle array (Fisher-Yates) but keep first and last in place
        function shuffleMiddle(arr) {
            const first = arr[0];
            const last = arr[arr.length - 1];
            const middle = arr.slice(1, -1);
            for (let i = middle.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [middle[i], middle[j]] = [middle[j], middle[i]];
            }
            return [first, ...middle, last];
        }

        // Build random progress stops that sum to 100
        function randomStops(count) {
            const raw = [];
            for (let i = 0; i < count; i++) {
                raw.push(3 + Math.random() * 10);
            }
            const sum = raw.reduce((a, b) => a + b, 0);
            const stops = [];
            let cumulative = 0;
            for (let i = 0; i < count; i++) {
                cumulative += (raw[i] / sum) * 100;
                stops.push(Math.min(cumulative, 100));
            }
            stops[stops.length - 1] = 100;
            return stops;
        }

        // Run sequence
        function run() {
            const messages = shuffleMiddle([...loadingMessages]);
            const stops = randomStops(messages.length);
            let idx = 0;

            function next() {
                if (idx >= messages.length) {
                    animateTo(100);
                    return;
                }

                statusText.textContent = messages[idx];
                const target = stops[idx];
                idx++;

                animateTo(target, () => {
                    const delay = 60 + Math.random() * 180;
                    setTimeout(next, delay);
                });
            }

            next();
        }

        setTimeout(run, 300);
    </script>
</body>
</html>
